<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício de tabela</title>
    <style>
           body {
            font-family: Arial, Helvetica, sans-serif;
        }

        table {
            border-collapse: collapse;
        }

        caption {
            font-size: 1.3em;
            font-weight: bold;
            padding: 10px;
        }

        th, td {
            border: 1px solid gray;
            padding: 10px;
            }

            tr.destaque{
                 background-color: rgb(21, 153, 21);
            }

            col.cnome{
                background-color: aquamarine;
            }

            col.cgrupo{
                 background-color: chartreuse;
            }
    </style>
</head>
<body>
     <h1>Exercício de tabela</h1> 

     <table>
        <colgroup>
            <col class="cnome">
            <col class="cgrupo" span="2">
            <col class="cprof">
        </colgroup>
        <caption>Cadastro</caption>
        <tr>
            <th scope="col">Nome</th>
            <th scope="col">Genero M/F</th>
            <th scope="col">Idade</th>
            <th scope="col">profissão</th>
        </tr>
        <tr class="destaque">
            <td>Ana Maria</td>
            <td>F</td>
            <td>25</td>
            <td>Jornalista</td>
        </tr>
        <tr>
             <td>Beatriz Souza</td>
                <td>Hulk</td>
                <td>Inception</td>
                <td>Batman</td>
        </tr>
        <tr>
             <td>Cláudia Melo</td>
                <td>Oblivion</td>
                <td>Matrix</td>
                <td>Big Hero</td>
        </tr> 
        <tr>
            <td>Daniel Lorenço</td>
                <td>Wall-E</td>
                <td>Oldboy</td>
                <td>Dangal</td>
        </tr> 
        <tr>
            <td>Fabiano Mota</td>
                <td>Star Wars V</td>
                <td>Taxi Driver</td>
                <td>Toy story</td>
        </tr>  
        <tr>
            <td>Ana Maria Santos</td>
                <td>Alien</td>

                <td>Vingadores</td>
        </tr>
     </table>
</body>
</html>
