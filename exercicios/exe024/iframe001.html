<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>estudos de iframe</title>
    <style>
        iframe {
            width: 500px;
        }
    </style>
</head>
<body>
    <h1>testando o uso de um iframe</h1>
    <p>Acessando o site do

    </p>
     <p>
       <iframe src="https://augustberchelmann.com/mario/" frameborder="0"></iframe>

       é bem legal 
     </p>
</body>
</html>
